name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Docker Compose setup
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      SERVICE_A_URL: http://service-a:5000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Build services
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Check Service A health endpoint
        run: |
          sleep 10
          curl --fail http://localhost:5000/health

      - name: Check Service B polling Service A
        run: |
          sleep 15
          docker compose logs service-b
          docker compose logs service-b | grep "Got data from Service A"

      - name: Stop services
        if: always()
        run: docker compose down
        
  terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform format check
        run: terraform fmt -check

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  publish:
    name: Build and publish Docker images
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Service A image
        uses: docker/build-push-action@v6
        with:
          context: ./service-a
          push: true
          tags: ${{ vars.SERVICE_A_IMAGE }}:${{ github.sha }}

      - name: Build and push Service B image
        uses: docker/build-push-action@v6
        with:
          context: ./service-b
          push: true
          tags: ${{ vars.SERVICE_B_IMAGE }}:${{ github.sha }}